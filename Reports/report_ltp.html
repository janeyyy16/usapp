										<th>7</th>
										<th>8</th>
										<th>9</th>
										<th>10</th>
										<th>11</th>
										<th>12</th>
										<th>13</th>
										<th>14</th>
										<th>15~20</th>
										<th>21~30</th>

									</tr>

								</tbody>
							</table>

						</div>
					</div>
				</div>
			`;
		}

		async function initLtpReportData() {
			const companyId = localStorage.getItem('userCompanyId') || '';
			let msg = 'Displaying built-in sample data.';
			if (window.AdminHubData && window.AdminHubReportBuilders) {
				try {
					const snap = await AdminHubData.fetchJsonSetting(companyId, 'ltp_report_snapshot');
					if (Array.isArray(snap?.ltpData) && snap.ltpData.length) {
						LTP_DATA = snap.ltpData;
						msg = `Loaded ${LTP_DATA.length} locations from saved LTP snapshot.`;
					} else {
						const tickets = await AdminHubData.loadTicketsForReports(companyId);
						const built = AdminHubReportBuilders.buildLtpDataFromTickets(tickets);
						if (built.length) {
							LTP_DATA = built;
							msg = `Built ${LTP_DATA.length} location rows from ${tickets.length} synced tickets.`;
						} else if (snap?.syncedAt) {
							msg = `Last ER sync: ${new Date(snap.syncedAt).toLocaleString()} (${(snap.rows || []).length} raw rows). Using sample chart data.`;
						}
					}
				} catch (error) {
					msg = `Using sample data: ${error.message}`;
				}
			}
			const el = document.getElementById('ltpDataSource');
			if (el) el.textContent = msg;
			const countEl = document.getElementById('ltpRecordCount');
			if (countEl) countEl.textContent = `${LTP_DATA.length} records found`;
		}

		function initCharts() {
			const ctx1 = document.getElementById('ltpByLocationChart').getContext('2d');
			const ctx2 = document.getElementById('ticketsPerLocationChart').getContext('2d');
			const ctx3 = document.getElementById('agingDistributionChart').getContext('2d');
			const ctx4 = document.getElementById('agingSegmentChart').getContext('2d');

			// Chart 1: LTP % by Location (sorted by LTP)
			const sortedLocations = [...LTP_DATA].sort((a, b) => b.ltp - a.ltp);
			ltpByLocationChart = new Chart(ctx1, {
				type: 'bar',
				data: {
					labels: sortedLocations.map(loc => loc.location),
					datasets: [{
						label: 'LTP %',
						data: sortedLocations.map(loc => loc.ltp),
						backgroundColor: sortedLocations.map(loc => {
							if (loc.ltp >= 60) return 'rgba(244, 67, 54, 0.7)';
							if (loc.ltp >= 45) return 'rgba(255, 152, 0, 0.7)';
							return 'rgba(76, 175, 80, 0.7)';
						}),
						borderColor: sortedLocations.map(loc => {
							if (loc.ltp >= 60) return 'rgba(244, 67, 54, 1)';
							if (loc.ltp >= 45) return 'rgba(255, 152, 0, 1)';
							return 'rgba(76, 175, 80, 1)';
						}),
						borderWidth: 1
					}]
				},
				options: {
					responsive: true,
					maintainAspectRatio: false,
					indexAxis: 'y',
					plugins: {
						legend: { display: false }
					},
					scales: {
						x: {
							ticks: { color: '#999' },
							grid: { color: 'rgba(65, 105, 225, 0.1)' }
						},
						y: {
							ticks: { color: '#999' }
						}
					}
				}
			});

			// Chart 2: Total Tickets per Location
			ticketsPerLocationChart = new Chart(ctx2, {
				type: 'bar',
				data: {
					labels: LTP_DATA.map(loc => loc.location),
					datasets: [{
						label: 'Total Tickets',
						data: LTP_DATA.map(loc => loc.total),
						backgroundColor: 'rgba(65, 105, 225, 0.6)',
						borderColor: 'rgba(65, 105, 225, 1)',
						borderWidth: 1
					}]
				},
				options: {
					responsive: true,
					maintainAspectRatio: false,
					plugins: {
						legend: { display: false }
					},
					scales: {
						y: {
							ticks: { color: '#999' },
							grid: { color: 'rgba(65, 105, 225, 0.1)' }
						},
						x: {
							ticks: { color: '#999' }
						}
					}
				}
			});

			// Chart 3: Aging Distribution (stacked bar)
			const agingTotals = agingLabels.map((_, idx) => 
				LTP_DATA.reduce((sum, loc) => sum + loc.data[idx], 0)
			);
			agingDistributionChart = new Chart(ctx3, {
				type: 'bar',
				data: {
					labels: agingLabels,
					datasets: [{
						label: 'Total Tickets by Age',
						data: agingTotals,
						backgroundColor: 'rgba(72, 209, 204, 0.7)',
						borderColor: 'rgba(72, 209, 204, 1)',
						borderWidth: 1
					}]
				},
				options: {
					responsive: true,
					maintainAspectRatio: false,
					plugins: {
						legend: { display: false }
					},
					scales: {
						y: {
							ticks: { color: '#999' },
							grid: { color: 'rgba(65, 105, 225, 0.1)' }
						},
						x: {
							ticks: { color: '#999' }
						}
					}
				}
			});

			// Chart 4: Days 0-5 vs 6-14 vs 15+ Distribution
			const days0to5 = LTP_DATA.map(loc => loc.data.slice(0, 6).reduce((a, b) => a + b, 0));
			const days6to14 = LTP_DATA.map(loc => loc.data.slice(6, 15).reduce((a, b) => a + b, 0));
			const days15plus = LTP_DATA.map(loc => loc.data.slice(15).reduce((a, b) => a + b, 0));

			agingSegmentChart = new Chart(ctx4, {
				type: 'doughnut',
				data: {
					labels: ['Days 0-5', 'Days 6-14', 'Days 15+'],
					datasets: [{
						data: [
							days0to5.reduce((a, b) => a + b, 0),
							days6to14.reduce((a, b) => a + b, 0),
							days15plus.reduce((a, b) => a + b, 0)
						],
						backgroundColor: [
							'rgba(76, 175, 80, 0.7)',
							'rgba(255, 152, 0, 0.7)',
							'rgba(244, 67, 54, 0.7)'
						],
						borderColor: [
							'rgba(76, 175, 80, 1)',
							'rgba(255, 152, 0, 1)',
							'rgba(244, 67, 54, 1)'
						],
						borderWidth: 2
					}]
				},
				options: {
					responsive: true,
					maintainAspectRatio: false,
					plugins: {
						legend: {
							position: 'bottom',
							labels: { color: '#999' }
						}
					}
				}
			});
		}

		/* ── Table Rendering ── */
		function renderTable() {
			const tbody = document.getElementById('tableBody');
			tbody.innerHTML = '';

			LTP_DATA.forEach(row => {
				const tr = document.createElement('tr');
				const ltpColor = row.ltp >= 60 ? 'ltp-high' : (row.ltp >= 45 ? 'ltp-medium' : 'ltp-low');
				
				let html = `<td><strong>${row.location}</strong></td>`;
				row.data.forEach(val => {
					html += `<td>${val}</td>`;
				});
				html += `<td>${row.total}</td>`;
				html += `<td class="ltp-value ${ltpColor}">${row.ltp.toFixed(2)}%</td>`;
				
				tr.innerHTML = html;
				tbody.appendChild(tr);
			});

			// Add TOTAL row
			const totalRow = document.createElement('tr');
			totalRow.style.fontWeight = 'bold';
			totalRow.style.background = 'rgba(65, 105, 225, 0.15)';
			
			let totalHtml = '<td>TOTAL</td>';
			for (let i = 0; i < 18; i++) {
				const sum = LTP_DATA.reduce((a, b) => a + b.data[i], 0);
				totalHtml += `<td>${sum}</td>`;
			}
			const allTotal = LTP_DATA.reduce((a, b) => a + b.total, 0);
			totalHtml += `<td>${allTotal}</td>`;
			totalHtml += '<td class="ltp-value">49.68%</td>';
			totalRow.innerHTML = totalHtml;
			tbody.appendChild(totalRow);
		}

		function goToDashboard() {
			window.location.href = '../../home.html';
		}

			logoutAcrossAllTabs('../../landing.html');

		/* ── Search Table Functionality ── */
		function setupTableSearch() {
			const searchInput = document.getElementById('searchInput');
			if (searchInput) {
				searchInput.addEventListener('input', function(e) {
					const query = e.target.value.toLowerCase();
					const rows = document.querySelectorAll('#tableBody tr');
					
					rows.forEach(row => {
						const text = row.textContent.toLowerCase();
						row.style.display = text.includes(query) ? '' : 'none';
					});
				});
			}
		}

		/* ── Modal Event Listeners ── */
		function setupModalEvents() {
			const modal = document.getElementById('searchModal');
			
			// Close on Escape key
			document.addEventListener('keydown', function(e) {
				if (e.key === 'Escape') {
					closeSearchModal();
				}
			});
			
			// Close on click outside modal
			modal.addEventListener('click', function(e) {
				if (e.target === modal) {
					closeSearchModal();
				}
			});
		}

		/* ── Initialize ── */
		document.addEventListener('DOMContentLoaded', function() {
			initpage();
			setTimeout(async () => {
				if (typeof loadUserInfo === 'function') {
					loadUserInfo();
				}
				await initLtpReportData();
				initCharts();
				renderTable();
				setupTableSearch();
			}, 100);
		});
	</script>
