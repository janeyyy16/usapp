<html lang="en">
<head>

	<style>
		/* ── Body Layout ── */
		body {
			display: flex;
			flex-direction: column;
			min-height: 100vh;
		}

		.module-page {
			flex: 1;
		}

		/* ── CSR Panel ── */
		.csr-panel {
			background: rgba(255, 255, 255, 0.08);
			border: 1px solid rgba(255, 255, 255, 0.15);
			border-radius: 10px;
			overflow: hidden;
			color: #fff;
			backdrop-filter: blur(10px);
			display: flex;
			flex-direction: column;
			padding: 0;
		}

		/* ── Controls Bar ── */
		.csr-controls {
			display: flex;
			flex-wrap: wrap;
			gap: 1.2rem;
			align-items: flex-end;
			padding: 1.25rem;
			background: rgba(17, 24, 39, 0.75);
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
		}

		.control-group {
			display: flex;
			flex-direction: column;
			gap: 0.35rem;
		}

		.control-label {
			font-size: 0.72rem;
			font-weight: 700;
			color: #94a3b8;
			text-transform: uppercase;
			letter-spacing: 0.04em;
		}

		.control-row {
			display: flex;
			gap: 0.5rem;
			align-items: center;
			flex-wrap: wrap;
		}

		.control-row input,
		.control-row select {
			padding: 0.5rem 0.7rem;
			background: rgba(2, 6, 23, 0.8);
			border: 1px solid rgba(148, 163, 184, 0.35);
			color: #e2e8f0;
			border-radius: 4px;
			font-size: 0.8rem;
		}

		.control-row input:focus,
		.control-row select:focus {
			outline: none;
			border-color: #60a5fa;
			box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.1);
		}

		.filter-buttons {
			display: flex;
			gap: 0.5rem;
			flex-wrap: wrap;
		}

		/* ── Buttons ── */
		.filter-btn {
			padding: 0.35rem 0.75rem;
			background: rgba(30, 41, 59, 0.8);
			border: 1px solid rgba(96, 165, 250, 0.3);
			color: #e2e8f0;
			border-radius: 4px;
			font-size: 0.8rem;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.15s;
		}

		.filter-btn:hover,
		.filter-btn.active {
			background: rgba(96, 165, 250, 0.2);
			border-color: #60a5fa;
			color: #e0e7ff;
		}

		/* ── Data Section ── */
		.csr-data {
			flex: 1;
			display: flex;
			flex-direction: column;
			padding: 1.25rem;
			overflow-y: auto;
		}

		.records-info {
			color: #94a3b8;
			font-size: 0.9rem;
			margin-bottom: 1rem;
		}

		.records-info strong {
			color: #dbeafe;
		}

		.table-wrapper {
			overflow-x: auto;
			flex: 1;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			text-align: left;
			font-size: 0.85rem;
		}

		thead {
			background: rgba(17, 24, 39, 0.9);
			border-bottom: 2px solid rgba(255, 255, 255, 0.1);
		}

		th {
			padding: 0.7rem;
			font-weight: 700;
			color: #cbd5e1;
			text-transform: uppercase;
			font-size: 0.72rem;
			letter-spacing: 0.04em;
		}

		td {
			padding: 0.65rem 0.7rem;
			border-bottom: 1px solid rgba(255, 255, 255, 0.08);
			color: #e2e8f0;
		}

		tbody tr {
			transition: background 0.2s ease;
		}

		tbody tr:hover {
			background: rgba(96, 165, 250, 0.08);
		}

		.ticket-link {
			color: #60a5fa;
			text-decoration: none;
			font-weight: 600;
			cursor: pointer;
			transition: color 0.2s ease;
		}

		.ticket-link:hover {
			color: #93c5fd;
			text-decoration: underline;
		}

		.repair-badge {
			display: inline-block;
			padding: 0.2rem 0.5rem;
			background: rgba(34, 197, 94, 0.15);
			border: 1px solid rgba(74, 222, 128, 0.3);
			border-radius: 3px;
			color: #86efac;
			font-size: 0.75rem;
			font-weight: 600;
		}

		.action-badge {
			display: inline-block;
			padding: 0.25rem 0.5rem;
			border-radius: 3px;
			font-size: 0.72rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.02em;
		}

		.action-info {
			background: rgba(59, 130, 246, 0.15);
			color: #93c5fd;
		}

		.action-schedule {
			background: rgba(34, 197, 94, 0.15);
			color: #86efac;
		}

		.action-call {
			background: rgba(168, 85, 247, 0.15);
			color: #d8b4fe;
		}

		.action-update {
			background: rgba(251, 146, 60, 0.15);
			color: #fed7aa;
		}

		.location-badge {
			display: inline-block;
			padding: 0.25rem 0.5rem;
			background: rgba(100, 116, 139, 0.15);
			border-radius: 3px;
			font-size: 0.73rem;
			color: #cbd5e1;
		}

		@media (max-width: 1024px) {
			.csr-controls {
				gap: 0.8rem;
			}

			th, td {
				padding: 0.5rem 0.4rem;
				font-size: 0.75rem;
			}
		}

		@media (max-width: 768px) {
			.control-row {
				flex-direction: column;
				align-items: stretch;
			}

			.table-wrapper {
				overflow-x: auto;
			}
		}

		footer {
			background: rgba(17, 24, 39, 0.6);
			border-top: 1px solid rgba(255, 255, 255, 0.1);
			padding: 1.25rem;
			text-align: center;
			color: rgba(255, 255, 255, 0.6);
			font-size: 0.8rem;
		}

		footer a {
			color: rgba(255, 255, 255, 0.85);
			text-decoration: none;
			transition: color 0.3s ease;
		}

		footer a:hover {
			color: white;
		}

		.floating-table-scrollbar {
			position: fixed;
			left: 0;
			bottom: 4px;
			z-index: 1100;
			overflow-x: auto;
			overflow-y: hidden;

			border-radius: 8px;

			box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
			display: none;
			max-width: calc(100vw - 28px);
		}

		function populateTable(data) {
			const tableBody = document.getElementById('tableBody');
			tableBody.innerHTML = '';

			data.forEach(record => {
				const row = document.createElement('tr');
				
				// Determine action badge class
				let actionClass = 'action-info';
				if (record.action.includes('SCHEDULE')) actionClass = 'action-schedule';
				else if (record.action.includes('CALL')) actionClass = 'action-call';
				else if (record.action.includes('CSR')) actionClass = 'action-update';

				row.innerHTML = `
					<td>${record.time}</td>
					<td><a href="../Tickets/ticket_details.html?ticket=${encodeURIComponent(record.ticket)}" target="_blank" class="ticket-link">${record.ticket}</a></td>
					<td><span class="repair-badge">${record.repairs} repair${record.repairs !== 1 ? 's' : ''}</span></td>
					<td><span class="location-badge">${record.location}</span></td>
					<td><span class="action-badge ${actionClass}">${record.action === 'SCHEDULE' ? '◆ ' : ''}${record.action}</span></td>
					<td>${record.csr}</td>
					<td>${record.tech || '—'}</td>
					<td>${record.job || '—'}</td>
					<td>${record.work || '—'}</td>
				`;
				tableBody.appendChild(row);
			});

			document.getElementById('recordCount').textContent = data.length;
		}

		function populateCSRDropdown() {
			const csrSet = new Set(csrWorkData.map(record => record.csr));
			const csrArray = Array.from(csrSet).sort();
			const csrFilter = document.getElementById('csrFilter');
			
			csrArray.forEach(csr => {
				const option = document.createElement('option');
				option.value = csr;
				option.textContent = csr;
				csrFilter.appendChild(option);
			});
		}

		function applyFilters() {
			const startDate = document.getElementById('startDate').value;
			const endDate = document.getElementById('endDate').value;
			const location = document.getElementById('locationFilter').value;
			const action = document.getElementById('actionFilter').value;
			const csr = document.getElementById('csrFilter').value;

			const filtered = csrWorkData.filter(record => {
				const dateParts = record.time.split(' ')[0].split('/');
				const recordDate = `${dateParts[2]}-${dateParts[0].padStart(2, '0')}-${dateParts[1].padStart(2, '0')}`;
				
				const dateMatch = recordDate >= startDate && recordDate <= endDate;
				const locationMatch = !location || record.location === location;
				const actionMatch = !action || record.action === action;
				const csrMatch = !csr || record.csr === csr;

				return dateMatch && locationMatch && actionMatch && csrMatch;
			});

			populateTable(filtered);
		}

		function resetFilters() {
			document.getElementById('startDate').value = '2026-05-19';
			document.getElementById('endDate').value = '2026-05-19';
			document.getElementById('locationFilter').value = '';
			document.getElementById('actionFilter').value = '';
			document.getElementById('csrFilter').value = '';
			populateTable(csrWorkData);
		}

		document.addEventListener('DOMContentLoaded', function() {
			loadUserInfo();
			applyPrettyUrl('csrDailyWork');
			populateCSRDropdown();
			populateTable(csrWorkData);
			setupScrollbars();
			
			// Add auto-refresh event listeners
			document.getElementById('startDate').addEventListener('change', applyFilters);
			document.getElementById('endDate').addEventListener('change', applyFilters);
			document.getElementById('locationFilter').addEventListener('change', applyFilters);
			document.getElementById('actionFilter').addEventListener('change', applyFilters);
			document.getElementById('csrFilter').addEventListener('change', applyFilters);
		});

		function setupScrollbars() {
			const tableContainer = document.getElementById('csrTableWrap');
			const floatingScrollbar = document.getElementById('floatingScrollbar');
			const floatingScrollbarInner = document.getElementById('floatingScrollbarInner');
			if (!tableContainer || !floatingScrollbar) return;
			function update() {
				const hasOverflow = tableContainer.scrollWidth > tableContainer.clientWidth;
				if (!hasOverflow) { floatingScrollbar.classList.remove('is-visible'); return; }
				const rect = tableContainer.getBoundingClientRect();
				if (rect.bottom > window.innerHeight) {
					floatingScrollbar.classList.add('is-visible');
					floatingScrollbarInner.style.width = tableContainer.scrollWidth + 'px';
					floatingScrollbar.style.width = Math.min(rect.width, window.innerWidth - 28) + 'px';
					floatingScrollbar.style.left = Math.max(14, Math.floor(rect.left)) + 'px';
				} else { floatingScrollbar.classList.remove('is-visible'); }
			}
			tableContainer.addEventListener('scroll', () => { floatingScrollbar.scrollLeft = tableContainer.scrollLeft; });
			floatingScrollbar.addEventListener('scroll', () => { tableContainer.scrollLeft = floatingScrollbar.scrollLeft; });
			update();
			window.addEventListener('scroll', update);
			window.addEventListener('resize', update);
		}
