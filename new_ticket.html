		function setFormStatus(message, type = 'info') {
			const statusEl = document.getElementById('formStatus');
			if (!statusEl) return;
			statusEl.textContent = message || '';
			if (type === 'error') {
				statusEl.style.color = '#fca5a5';
			} else if (type === 'ok') {
				statusEl.style.color = '#86efac';
			} else {
				statusEl.style.color = '#bfdbfe';
			}
		}

		async function getCompanyDbId(companyCode) {
			if (!companyCode) return null;
			const { data, error } = await supabaseClient
				.from('companies')
				.select('id')
				.eq('company_id', companyCode)
				.maybeSingle();
			if (error) {
				throw new Error(error.message || 'Failed to resolve company id.');
			}
			return data?.id || null;
		}

		function toIsoOrNull(value) {
			if (!value) return null;
			const dt = new Date(value);
			if (Number.isNaN(dt.getTime())) return null;
			return dt.toISOString();
		}

		// Form submission handler
		document.getElementById('ticketForm').addEventListener('submit', async function(e) {
			e.preventDefault();
			
			// Collect form data
			const formData = {
				ticketNo: document.getElementById('ticketNo').value.trim().toUpperCase(),
				fakeTicket: document.getElementById('fakeTicket').checked,
				source: document.getElementById('source').value,
				customerName: document.getElementById('customerName').value,
					primaryPhone: document.getElementById('primaryPhone').value,
					secondaryPhone: document.getElementById('secondaryPhone').value,
				email1: document.getElementById('email1').value,
				address: document.getElementById('address').value,
				city: document.getElementById('city').value,
				zipCode: document.getElementById('zipCode').value,
				state: document.getElementById('state').value,
				addressNote: document.getElementById('addressNote').value,
				model: document.getElementById('model').value,
				serialNo: document.getElementById('serialNo').value,
				modelVersion: document.getElementById('modelVersion').value,
				brand: document.getElementById('brand').value,
				productCategory: document.getElementById('productCategory').value,
				purchaseDate: document.getElementById('purchaseDate').value,
				warrantyType: document.getElementById('warrantyType').value,
				cxPreferredDate: document.getElementById('cxPreferredDate').value,
				callTakenDate: document.getElementById('callTakenDate').value,
				problemDescription: document.getElementById('problemDescription').value
			};

			try {
				setFormStatus('Saving ticket to database...', 'info');
				if (!userCompanyId) {
					throw new Error('Missing company code. Please login again.');
				}

				// Resolve company UUID from company_id code
				const { data: co, error: coErr } = await supabaseClient
					.from('companies')
					.select('id')
					.eq('company_id', userCompanyId)
					.maybeSingle();
				if (coErr) throw new Error(coErr.message);
				const companyUuid = co?.id || null;

				// Generate UUID client-side so we never need .select() after insert
				// (avoids SELECT RLS policy check on the returning clause)
				const ticketUuid = crypto.randomUUID();

				// --- Insert ticket row ---
				const payload = {
					id: ticketUuid,
					ticket_no: formData.ticketNo,
					is_fake_ticket: formData.fakeTicket,
					source: formData.source,
					customer_name: formData.customerName,
					customer_address: formData.address,
					customer_city: formData.city,
					customer_zip: formData.zipCode,
					customer_state: formData.state,
					customer_home_phone: formData.primaryPhone || null,
					customer_cell_phone_1: formData.secondaryPhone || null,
					customer_email_1: formData.email1 || null,
					customer_address_note: formData.addressNote || null,
					model: formData.model,
					serial_no: formData.serialNo,
					model_version: formData.modelVersion || null,
					brand: formData.brand,
					product_category: formData.productCategory,
					purchase_date: formData.purchaseDate || null,
					warranty_type: formData.warrantyType,
					cx_preferred_date: formData.cxPreferredDate || null,
					call_taken_date: formData.callTakenDate,
					repair_status: 'CSR-Acknowledged',
					problem_description: formData.problemDescription,
					company_id: companyUuid
				};

				const { error: insertErr } = await supabaseClient
					.from('tickets')
					.insert(payload);

				if (insertErr) throw new Error(insertErr.message || 'Failed to save ticket.');

				// --- Write rich detail data to ticket_details (same format as ER sync) ---
				if (ticketUuid) {
					const detail_json = {
						title: `Ticket #${formData.ticketNo}`,
						href: '',
						capturedAt: new Date().toISOString(),
						source: 'manual',
						general_information: {
							fields: {
								TicketNumber: formData.ticketNo,
								CxAddress1: formData.address,
								CxAddress2: '',
								CxCity: formData.city,
								CxState: formData.state,
								CxZipCode: formData.zipCode,
								CxHomePhone: formData.primaryPhone || '',
								CxCellPhone: formData.secondaryPhone || '',
								CxAddressNote: formData.addressNote || '',
								CxEmail: formData.email1 || '',
								Brand: formData.brand || '',
								ModelCode: formData.model,
								SerialNo: formData.serialNo || '',
								ModelVersion: formData.modelVersion || '',
								ProductCategory: formData.productCategory,
								PurchaseDate: formData.purchaseDate || '',
								WarrantyType: formData.warrantyType
							},
							mapped: {
								ticket_no: formData.ticketNo,
								customer_first_name: '',
								customer_last_name: '',
								customer_full_name: formData.customerName,
								customer_address_1: formData.address,
								customer_address_2: '',
								customer_city: formData.city,
								customer_state: formData.state,
								customer_zip: formData.zipCode,
								customer_home_phone: formData.primaryPhone || '',
								customer_cell_phone: formData.secondaryPhone || '',
								customer_email_1: formData.email1 || '',
								customer_address_note: formData.addressNote || '',
								brand: formData.brand || '',
								model: formData.model,
								serial_no: formData.serialNo || '',
								product_category: formData.productCategory,
								purchase_date: formData.purchaseDate || '',
								warranty_type: formData.warrantyType,
								resolution: ''
							},
							labels: [],
							tables: []
						},
						service_tracking: {
							fields: {
								TriageNote: formData.problemDescription,
								ClaimNote: ''
							},
							mapped: {
								triage_note: formData.problemDescription,
								claim_note: '',
								part_not_needed: '',
								show_historical_record: ''
							},
							labels: [],
							tables: []
						}
					};

					const { error: tdErr } = await supabaseClient.from('ticket_details').insert({
						ticket_id: ticketUuid,
						ticket_no: formData.ticketNo,
						company_id: companyUuid,
						detail_json,
						source_url: 'manual'
					});
					if (tdErr) console.warn('ticket_details insert failed (non-critical):', tdErr.message);
				}

				setFormStatus(`Ticket ${formData.ticketNo} saved successfully. Redirecting...`, 'ok');
				setTimeout(() => {
					window.location.href = `ticket_list.html?ticket=${encodeURIComponent(formData.ticketNo)}`;
				}, 900);
			} catch (error) {
				setFormStatus(error.message || 'Failed to create ticket.', 'error');
			}
		});

		// Set default date to today for Call Received Date
		document.getElementById('callTakenDate').valueAsDate = new Date();
	</script>
